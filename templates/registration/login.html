{% extends "base.html" %}
{% load static %}
{% block title %}Sign In — Iscar Process Dashboard{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img src="{% static 'dashboard/img/header_logo.png' %}" alt="Iscar" class="login-logo">
      <div class="login-title">Process Dashboard</div>
      <div class="login-subtitle">Sign in to continue</div>
    </div>

    {% if form.errors %}
      <div class="alert">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <input class="form-input" type="text" name="username" id="id_username"
               autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <input class="form-input" type="password" name="password" id="id_password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Sign in →</button>
    </form>
  </div>
</div>
{% endblock %}
